<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1</title>
    <style>
        /* Cài đặt chung cho trang */
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            padding: 20px;
            background-color: #fff;
            color: #000;
        }

        /* Tiêu đề Album */
        h1 {
            text-align: center;
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* Đường kẻ ngang */
        hr {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 0;
        }

        /* Container chứa lưới ảnh */
        .album-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-grid {
            display: grid;
            /* Chia thành 4 cột bằng nhau */
            grid-template-columns: repeat(4, 1fr);
            /* Khoảng cách nhỏ giữa các ảnh */
            gap: 10px;
            padding: 20px 0;
        }

        /* Định dạng ảnh */
        .image-grid img {
            width: 100%;
            height: 450px; /* Chiều cao cố định để giống ảnh mẫu */
            object-fit: cover; /* Giúp ảnh không bị méo khi co giãn */
            display: block;
        }

        /* Responsive: Tự động điều chỉnh khi xem trên điện thoại */
        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="album-container">
        <h1>ALBUM ẢNH</h1>
        
        <hr>

        <div class="image-grid">
            <img src="huou.jpg" alt="Hươu">
            <img src="ngong.jpg" alt="Ngỗng">
            <img src="tho.jpg" alt="Thỏ">
            <img src="cu.jpg" alt="Cú">
        </div>

        <hr>

        <div class="image-grid">
            <img src="huou.jpg" alt="Hươu">
            <img src="ngong.jpg" alt="Ngỗng">
            <img src="tho.jpg" alt="Thỏ">
            <img src="cu.jpg" alt="Cú">
        </div>
    </div>

</body>
</html>
